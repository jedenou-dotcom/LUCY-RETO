<script>

/* ===== SISTEMA MONEDAS ===== */

let monedas = parseInt(localStorage.getItem("monedas")) || 0;

function guardarMonedas(){
    localStorage.setItem("monedas", monedas);
}

function sumarMonedas(cantidad){
    monedas += cantidad;
    guardarMonedas();
    actualizarMonedasUI();
}

function actualizarMonedasUI(){

    let hud = document.getElementById("hud-coins");

    if(!hud){

        const box = document.createElement("div");

        box.id = "hud-coins";

        box.style.position = "fixed";
        box.style.top = "12px";
        box.style.left = "50%";
        box.style.transform = "translateX(-50%)";
        box.style.zIndex = "9999";
        box.style.padding = "8px 16px";
        box.style.borderRadius = "14px";
        box.style.background = "rgba(0,0,0,.45)";
        box.style.backdropFilter = "blur(12px)";
        box.style.border = "1px solid rgba(255,255,255,.1)";
        box.style.fontWeight = "bold";
        box.style.fontFamily = "Orbitron";
        box.style.color = "white";
        box.innerHTML = "🪙 " + monedas;

        document.body.appendChild(box);

    }else{
        hud.innerHTML = "🪙 " + monedas;
    }
}

actualizarMonedasUI();

/* ===== GUARDADO AUTOMÁTICO ===== */

function guardarProgreso(){

    localStorage.setItem(
        "nivelesCompletados",
        JSON.stringify(nivelesCompletados)
    );

    localStorage.setItem(
        "mascotaState",
        JSON.stringify(mascotaState)
    );
}

function cargarProgreso(){

    const nivelesGuardados =
        localStorage.getItem("nivelesCompletados");

    const mascotaGuardada =
        localStorage.getItem("mascotaState");

    if(nivelesGuardados){
        nivelesCompletados =
        JSON.parse(nivelesGuardados);
    }

    if(mascotaGuardada){
        mascotaState =
        JSON.parse(mascotaGuardada);
    }

    refreshMascotaUI();
    refreshLevelsInterface();
}

window.onload = () => {
    cargarProgreso();
};

/* ===== RECOMPENSAS ===== */

const oldClear = triggClearScreen;

triggClearScreen = function(){

    sumarMonedas(25);

    oldClear();

    guardarProgreso();
};

/* ===== BONUS MODO RITMO ===== */

const oldEnd = endOsuGame;

endOsuGame = function(aborted){

    if(!aborted){

        sumarMonedas(
            Math.floor(osuScore / 2)
        );
    }

    oldEnd(aborted);
};

/* ===== PARTÍCULAS PREMIUM ===== */

function crearParticula(x,y){

    const p = document.createElement("div");

    p.style.position = "fixed";
    p.style.left = x + "px";
    p.style.top = y + "px";
    p.style.width = "8px";
    p.style.height = "8px";
    p.style.borderRadius = "50%";
    p.style.background = "white";
    p.style.pointerEvents = "none";
    p.style.zIndex = "99999";
    p.style.boxShadow = "0 0 12px white";

    document.body.appendChild(p);

    const angle = Math.random() * Math.PI * 2;
    const dist = 40 + Math.random() * 40;

    const tx = Math.cos(angle) * dist;
    const ty = Math.sin(angle) * dist;

    p.animate([
        {
            transform:"translate(0,0) scale(1)",
            opacity:1
        },
        {
            transform:`translate(${tx}px,${ty}px) scale(0)`,
            opacity:0
        }
    ],{
        duration:700
    });

    setTimeout(()=>p.remove(),700);
}

/* ===== CLICK FX ===== */

document.addEventListener("click",(e)=>{

    for(let i=0;i<6;i++){
        crearParticula(
            e.clientX,
            e.clientY
        );
    }

});

/* ===== TIENDA SIMPLE ===== */

function abrirTienda(){

    alert(
`🛒 TIENDA

- nuevos temas
- mascotas
- efectos
- sonidos premium`
    );
}

/* ===== LOGROS ===== */

function verificarLogros(){

    const completados =
    Object.values(nivelesCompletados)
    .filter(Boolean).length;

    if(completados >= 5){

        alert("🏆 LOGRO: Explorador");
    }

    if(completados >= 10){

        alert("👑 LOGRO: Maestro");
    }
}

/* ===== MÚSICA AMBIENTE ===== */

let ambientStarted = false;

function iniciarMusica(){

    if(ambientStarted) return;

    ambientStarted = true;

    if(!audioCtx) initAudioEngine();

    mainOsc.frequency.setValueAtTime(
        90,
        audioCtx.currentTime
    );
}

document.body.addEventListener(
    "click",
    iniciarMusica,
    { once:true }
);

</script>
