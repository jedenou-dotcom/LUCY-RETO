<style>
    /* --- MEJORAS VISUALES: SUAVIZADO Y ELEGANCIA --- */
    :root {
        --glass-bg: rgba(255, 255, 255, 0.05);
        --glass-border: rgba(255, 255, 255, 0.1);
        --accent-soft: rgba(177, 70, 255, 0.2);
    }

    .panel-grunge {
        background: rgba(15, 5, 25, 0.8); /* Fondo más profundo */
        backdrop-filter: blur(25px);
        border: 1px solid var(--glass-border);
        box-shadow: 0 10px 40px rgba(0,0,0,0.5), inset 0 0 1px rgba(255,255,255,0.1);
        padding: 40px;
        border-radius: 32px; /* Más redondeado para un look más moderno */
    }

    /* Mejora de botones para ser menos agresivos */
    .btn-grunge {
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.1);
        transition: all 0.3s ease;
    }

    .btn-grunge:hover {
        background: var(--primary);
        box-shadow: 0 0 20px var(--shadow-glow);
    }

    /* Contenedor del Santuario más limpio */
    .mascot-stats-grid {
        gap: 15px;
        margin: 25px 0;
    }

    .stat-card {
        background: rgba(0,0,0,0.2);
        border: none;
        border-radius: 16px;
    }

    /* Estilo para el nuevo acceso al juego */
    .game-entry-portal {
        margin-top: 20px;
        padding: 20px;
        border-radius: 20px;
        background: linear-gradient(135deg, rgba(82, 3, 128, 0.3), transparent);
        text-align: center;
        border: 1px dashed var(--primary-glow);
        cursor: pointer;
        transition: transform 0.2s;
    }
    .game-entry-portal:hover { transform: scale(1.02); border-style: solid; }
</style>

<!-- MÓDULO: SANTUARIO (Actualizado) -->
<div id="m-mascot" class="panel-grunge">
    <div class="system-tag">VIO_SANTUARIO</div>
    <h2 class="section-header">SANTUARIO</h2>
    
    <div class="character-container">
        <!-- Vio animado -->
        <div class="vio-orbit-zone">
            <svg id="vio-sanctuary" class="vio-svg-body happy" viewBox="0 0 100 100" onclick="acariciarMascota()">
                <!-- Path y ojos igual que tenías -->
            </svg>
        </div>
    </div>

    <div class="mascot-stats-grid">
        <!-- Stats de Vio -->
    </div>

    <!-- Integración directa del acceso al juego -->
    <div class="game-entry-portal" onclick="startOsuGameMode()">
        <i class="fa-solid fa-gamepad" style="font-size: 24px; color: var(--primary-glow);"></i>
        <div style="font-family: 'Orbitron'; margin-top: 8px;">ENTRENAMIENTO RÍTMICO</div>
        <p style="font-size: 10px; color: var(--text-accent);">Interactúa con Vio para ganar energía</p>
    </div>

    <button class="btn-back-menu" onclick="changeModule('m-mascot', 'm-main-menu')">VOLVER</button>
</div>
